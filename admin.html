<!DOCTYPE html>
<html>
<body>
    <h1>Reporte Admin</h1>
    <button onclick="cargar()">Ver Reporte Actual</button>
    <pre id="display"></pre>
    <script>
        async function cargar() {
            const res = await fetch('http://192.168.1.39:3000/reporte');
            document.getElementById('display').innerText = await res.text();
        }
    </script>
</body>
</html>
