<!DOCTYPE html>
<html>
<body>
    <h1>Reporte de Ventas</h1>
    <button onclick="descargar()">Descargar Reporte</button>
    <pre id="lista"></pre>
    <script>
        async function descargar() {
            const res = await fetch('http://192.168.1.39:3000/reporte');
            const texto = await res.text();
            document.getElementById('lista').innerText = texto;
        }
    </script>
</body>
</html>
