<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador GNC - Playero</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #camara-contenedor { width: 100%; max-width: 350px; border: 3px solid #00ff00; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        video { width: 100%; }
        .panel { width: 100%; max-width: 350px; background: #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #444; padding: 5px; text-align: center; }
    </style>
</head>
<body>
    <h2>⛽ Validador GNC</h2>
    <div id="camara-contenedor"><video id="video" autoplay playsinline></video></div>
    
    <div class="panel">
        <input type="text" id="patente-manual" placeholder="Tipear patente" style="text-transform: uppercase;">
        <button onclick="buscarManual()" style="background:#007bff; color:white;">BUSCAR PATENTE</button>
    </div>

    <div id="resultado" class="panel" style="display:none;">
        <h3 id="patente-detectada"></h3>
        <p id="datos-cliente"></p>
        <input type="number" id="monto" placeholder="Monto Original ($)" oninput="calcularDescuento()">
        <h2 id="monto-final" style="color: #00ff00;">Total a cobrar: $0</h2>
        <button onclick="finalizar()" style="background:#00ff00;">CONFIRMAR CARGA</button>
    </div>

    <div class="panel">
        <h3>Historial de Turno</h3>
        <table id="tabla-historial">
            <tr><th>Patente</th><th>Total</th></tr>
        </table>
        <button onclick="realizarCierre()" style="background:#ff4757; color:white; margin-top:15px;">CERRAR TURNO</button>
    </div>

    <script>
        const IP = "192.168.1.39";
        
        function calcularDescuento() {
            const monto = document.getElementById('monto').value;
            const final = (monto * 0.95).toFixed(2);
            document.getElementById('monto-final').innerText = "Total a cobrar: $" + final;
        }

        async function finalizar() {
            const p = document.getElementById('patente-detectada').innerText.replace("Patente: ", "");
            const m = document.getElementById('monto').value;
            const total = (m * 0.95).toFixed(2);
            
            await fetch(`http://${IP}:3000/guardar-carga`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ patente: p, monto: m, total: total })
            });

            // Agregar a la tabla local
            const tabla = document.getElementById('tabla-historial');
            tabla.innerHTML += `<tr><td>${p}</td><td>$${total}</td></tr>`;
            
            alert("Carga guardada: $" + total);
            document.getElementById('resultado').style.display = 'none';
        }

        // ... resto de funciones (buscarManual, realizarCierre) igual que antes ...
    </script>
</body>
</html>
