<!DOCTYPE html>
<html>
<body>
    <h3>Lector o Carga Manual</h3>
    <video id="video" autoplay playsinline style="width:100%"></video>
    <input type="text" id="manual" placeholder="Patente manual">
    <input type="number" id="monto" placeholder="Monto">
    <button onclick="guardar()">Guardar Venta</button>
    <button onclick="cierre()">Cierre de Turno</button>
    <div id="status"></div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <script>
        async function guardar() {
            const patente = document.getElementById('manual').value;
            const monto = document.getElementById('monto').value;
            await fetch('http://192.168.1.39:3000/guardar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({patente, monto})
            });
            alert("Guardado");
        }
        function cierre() {
            window.location.href = 'http://192.168.1.39:3000/reporte';
        }
        // ... (Aquí iría la lógica del lector Tesseract que ya probamos)
    </script>
</body>
</html>
