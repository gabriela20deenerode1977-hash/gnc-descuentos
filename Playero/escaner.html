<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador GNC</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #camara-contenedor { width: 100%; max-width: 350px; border: 3px solid #00ff00; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        video { width: 100%; }
        .panel { width: 100%; max-width: 350px; background: #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        input { width: 90%; padding: 12px; margin: 5px 0; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <h2>⛽ Validador GNC</h2>
    <div id="camara-contenedor"><video id="video" autoplay playsinline></video></div>
    
    <div class="panel">
        <input type="text" id="patente-manual" placeholder="Tipear patente" style="text-transform: uppercase;">
        <button onclick="buscarManual()" style="background:#007bff; color:white;">BUSCAR PATENTE</button>
    </div>

    <div id="resultado" class="panel" style="display:none;">
        <h3 id="patente-detectada"></h3>
        <div id="datos-cliente"></div>
        <input type="number" id="monto" placeholder="Monto ($)">
        <button onclick="finalizar()" style="background:#00ff00;">CONFIRMAR CARGA</button>
    </div>

    <div class="panel">
        <button onclick="realizarCierre()" style="background:#ff4757; color:white;">CERRAR TURNO Y LIMPIAR</button>
    </div>

    <script>
        const IP = "192.168.1.39";
        async function realizarCierre() {
            const res = await fetch(`http://${IP}:3000/total-descuento-dia`);
            const data = await res.json();
            if (confirm("Total descontado: $" + data.total + ". ¿Cerrar turno?")) {
                await fetch(`http://${IP}:3000/cerrar-turno`);
                location.reload();
            }
        }
        async function verificarPatente(p) {
            const res = await fetch(`http://${IP}:3000/verificar-patente?patente=${p}`);
            if (res.status === 200) {
                const data = await res.json();
                document.getElementById('patente-detectada').innerText = "Patente: " + data.patente;
                document.getElementById('datos-cliente').innerText = data.nombre;
                document.getElementById('resultado').style.display = 'block';
            } else { alert("No encontrado"); }
        }
        async function finalizar() {
            const p = document.getElementById('patente-detectada').innerText.replace("Patente: ", "");
            const m = document.getElementById('monto').value;
            await fetch(`http://${IP}:3000/guardar-carga`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ patente: p, monto: m, total: (m * 0.95).toFixed(2) })
            });
            alert("Carga guardada.");
            location.reload();
        }
        function buscarManual() { verificarPatente(document.getElementById('patente-manual').value); }
        navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}}).then(s => document.getElementById('video').srcObject = s);
    </script>
</body>
</html>
