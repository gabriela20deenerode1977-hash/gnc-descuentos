<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
</head>
<body>
    <video id="video" autoplay playsinline style="width:100%"></video>
    <div id="resultado">Esperando...</div>
    <script>
        const IP = "192.168.1.39"; // Asegurate que esta sea tu IP real
        navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}}).then(s => document.getElementById('video').srcObject = s);
        
        async function verificar(patente) {
            const res = await fetch(`http://${IP}:3000/verificar?patente=${patente}`);
            document.getElementById('resultado').innerText = await res.text();
        }
    </script>
</body>
</html>
