<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador GNC playero</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 15px; background: #121212; color: white; margin: 0; }
        
        /* Encabezado */
        .header { font-size: 24px; font-weight: bold; margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Cartel de guía rojo exacto a tu diseño */
        .cartel-camara { background: rgba(255, 0, 0, 0.15); border: 2px solid #ff0000; color: #ff9999; padding: 12px; font-size: 15px; font-weight: bold; margin: 10px auto 20px auto; border-radius: 8px; max-width: 450px; }

        /* Contenedor de la cámara corregido para que se abra el recuadro */
        #reader { width: 100%; max-width: 450px; margin: 0 auto 20px auto; border: 1px solid #333; border-radius: 8px; background: #000; }

        /* Formulario de carga que aparece al escanear */
        .resultado { background: #222; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 450px; display: none; box-sizing: border-box; }
        .resultado input { width: 90%; padding: 15px; font-size: 20px; margin: 10px 0; border-radius: 5px; border: none; text-align: center; }
        .resultado button { background: #00ff00; color: black; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 90%; }
        .monto-final { color: #00ff00; font-size: 28px; font-weight: bold; margin: 10px 0; }

        /* Historial y Tabla idénticos a tu formato original */
        .seccion-historial { max-width: 450px; margin: 20px auto; text-align: left; }
        .titulo-historial { font-size: 20px; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; background: #ffffff; color: #000000; border-radius: 6px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 15px; }
        th { background: #f4f4f4; color: #333; font-weight: bold; }

        /* Filtros y Botón de Descarga */
        .filtro-fechas { background: #1e1e1e; border: 1px solid #333; border-radius: 10px; max-width: 450px; margin: 25px auto 10px auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; box-sizing: border-box; }
        .filtro-fechas h4 { margin: 0 0 5px 0; color: #00ff00; font-size: 16px; text-align: center; }
        .filtro-fechas div { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .filtro-fechas label { font-weight: bold; color: #aaa; font-size: 15px; }
        .filtro-fechas input[type="date"] { width: 65%; padding: 8px; font-size: 16px; background: #2d2d2d; color: #00ff00; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        
        .btn-descarga { background: #ffc107; color: black; width: 100%; max-width: 450px; font-size: 18px; padding: 16px; margin: 10px auto; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; display: block; }
    </style>
</head>
<body>

    <div class="header">⛽ Validador GNC</div>
    
    <div class="cartel-camara">Cámara activada. Si la patente no se detecta, acércala al recuadro.</div>
    <div id="reader"></div>

    <div id="resultado" class="resultado">
        <h3 id="patente-detectada" style="margin-top:0;"></h3>
        <p style="margin:5px 0;">Monto cargado ($):</p>
        <input type="number" id="monto" placeholder="Ej: 4000" oninput="calcular()">
        <div class="monto-final">Total a Cobrar: $<span id="total">0</span></div>
        <p style="color: #aaa; font-size:14px; margin:5px 0;">Descuento 5% aplicado</p>
        <br>
        <button onclick="finalizar()">Confirmar Carga</button>
    </div>

    <div class="seccion-historial">
        <div class="titulo-historial">📋 Historial del Turno Actual</div>
        <table id="tabla-cargas">
            <thead>
                <tr>
                    <th>Turno</th>
                    <th>Turno Datoo</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <div class="filtro-fechas">
        <h4>📅 Seleccionar Período a Descargar</h4>
        <div>
            <label for="fechaDesde">Desde:</label>
            <input type="date" id="fechaDesde">
        </div>
        <div>
            <label for="fechaHasta">Hasta:</label>
            <input type="date" id="fechaHasta">
        </div>
    </div>
    <button class="btn-descarga" onclick="descargarYFecharTurno()">📥 DESCARGAR EXCEL POR PERÍODO</button>

    <script>
        // Tu IP fija para trabajar en la red interna de la estación
        const IP_DE_LA_COMPU = "192.168.1.96"; 

        let cargasDelTurno = JSON.parse(localStorage.getItem('cargas_turno')) || [];
        actualizarTabla();

        const hoyStr = new Date().toISOString().slice(0, 10);
        document.getElementById('fechaDesde').value = hoyStr;
        document.getElementById('fechaHasta').value = hoyStr;

        function onScanSuccess(decodedText) {
            document.getElementById('patente-detectada').innerText = "Vehículo: " + decodedText;
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('reader').style.display = 'none';
            document.querySelector('.cartel-camara').style.display = 'none';
            if (window.html5QrcodeScanner) {
                html5QrcodeScanner.clear();
            }
        }

        function calcular() {
            let monto = document.getElementById('monto').value;
            let total = monto * 0.95;
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function finalizar() {
            const patente = document.getElementById('patente-detectada').innerText.replace("Vehículo: ", "");
            const monto = parseFloat(document.getElementById('monto').value);

            if (!monto || monto <= 0) {
                alert("Por favor, ingresa un monto válido.");
                return;
            }

            const fecha = new Date().toLocaleString();
            const total = (monto * 0.95).toFixed(2);

            cargasDelTurno.push({ patente, fecha });
            localStorage.setItem('cargas_turno', JSON.stringify(cargasDelTurno));

            fetch(`http://${IP_DE_LA_COMPU}:3000/guardar-carga`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ patente, monto, total })
            })
            .then(res => console.log("Guardado en la caja."))
            .catch(err => console.error("Error al conectar con la caja:", err));

            alert("✅ Carga registrada.");
            location.reload();
        }

        function actualizarTabla() {
            const tbody = document.querySelector('#tabla-cargas tbody');
            tbody.innerHTML = '';
            cargasDelTurno.forEach(carga => {
                const fila = `<tr>
                    <td>${carga.patente}</td>
                    <td>${carga.fecha}</td>
                </tr>`;
                tbody.innerHTML += fila;
            });
        }

        function descargarYFecharTurno() {
            const desde = document.getElementById('fechaDesde').value;
            const hasta = document.getElementById('fechaHasta').value;

            if (!desde || !hasta) {
                alert("Por favor, seleccioná ambas fechas.");
                return;
            }

            const urlDescarga = `http://${IP_DE_LA_COMPU}:3000/descargar-reporte?desde=${desde}&hasta=${hasta}`;

            fetch(urlDescarga)
            .then(async response => {
                if (response.status === 444) {
                    alert("⚠️ No se encontraron registros de cargas.");
                    return;
                }
                window.location.href = urlDescarga;
                localStorage.removeItem('cargas_turno');
                cargasDelTurno = [];
                alert("🔒 Turno procesado y descargado.");
                setTimeout(() => location.reload(), 1000);
            })
            .catch(err => alert("❌ Error al conectar con la PC central."));
        }

        // Ejecución limpia del recuadro del lector
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
