<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Validador GNC - Playero</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 10px; }
        .panel { background: #222; padding: 20px; border-radius: 10px; margin-top: 20px; }
        button { padding: 15px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <h2>⛽ Validador GNC</h2>
    <div id="camara-contenedor"><video id="video" autoplay playsinline style="width:100%"></video></div>
    <div id="status-lector">Cargando...</div>

    <div class="input-manual">
        <input type="text" id="patente-manual" placeholder="Tipear patente" style="text-transform: uppercase;">
        <button onclick="buscarManual()">Buscar</button>
    </div>

    <div id="resultado" class="panel" style="display:none;">
        <h3 id="patente-detectada"></h3>
        <div id="datos-cliente"></div>
        <input type="number" id="monto" placeholder="Monto ($)">
        <button onclick="finalizar()" style="background:#00ff00;">CONFIRMAR CARGA</button>
    </div>

    <div class="panel">
        <h3>Cierre de Turno</h3>
        <button onclick="realizarCierre()" style="background: #ff4757; color: white;">CALCULAR TOTAL Y CERRAR</button>
    </div>

    <script>
        const IP = "192.168.1.39";
        const video = document.getElementById('video');

        window.addEventListener('load', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) { alert("Error de cámara"); }
        });

        async function realizarCierre() {
            const resTotal = await fetch(`http://${IP}:3000/total-descuento-dia`);
            const data = await resTotal.json();
            if (confirm("Total descontado hoy: $" + data.total + ". ¿Confirmar cierre y limpiar historial?")) {
                await fetch(`http://${IP}:3000/cerrar-turno`);
                alert("Turno cerrado. Sistema limpio.");
                location.reload();
            }
        }

        async function verificarPatente(patente) {
            const res = await fetch(`http://${IP}:3000/verificar-patente?patente=${patente}`);
            if (res.status === 200) {
                const data = await res.json();
                document.getElementById('patente-detectada').innerText = "Patente: " + data.patente;
                document.getElementById('datos-cliente').innerText = data.nombre;
                document.getElementById('resultado').style.display = 'block';
            } else { alert("No registrado"); }
        }

        async function finalizar() {
            const p = document.getElementById('patente-detectada').innerText.replace("Patente: ", "");
            const m = document.getElementById('monto').value;
            await fetch(`http://${IP}:3000/guardar-carga`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ patente: p, monto: m, total: (m * 0.95).toFixed(2) })
            });
            alert("✅ Carga guardada.");
            location.reload();
        }

        function buscarManual() {
            const p = document.getElementById('patente-manual').value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            if(p) verificarPatente(p);
        }
    </script>
</body>
</html>
