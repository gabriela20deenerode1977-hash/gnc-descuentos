<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador GNC - Playero</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; margin: 0; }
        #reader { width: 100%; max-width: 500px; margin: auto; border: 2px solid #00ff00; }
        .resultado { background: #222; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        input { width: 80%; padding: 15px; font-size: 20px; margin: 10px 0; border-radius: 5px; border: none; text-align: center; }
        button { background: #00ff00; color: black; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; margin: 10px; }
        
        /* Filtros de fecha */
        .filtro-fechas {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            max-width: 400px;
            margin: 30px auto 10px auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .filtro-fechas div {
            display: flex;
            justify-content: space-between;
            width: 90%;
            align-items: center;
        }
        .filtro-fechas label { font-weight: bold; color: #aaa; font-size: 16px; }
        .filtro-fechas input[type="date"] { 
            width: 60%; 
            padding: 8px; 
            font-size: 16px; 
            background: #2d2d2d; 
            color: #00ff00; 
            border: 1px solid #444; 
            margin: 0;
        }

        .btn-descarga { background: #ffc107; color: black; width: 100%; max-width: 400px; font-size: 20px; padding: 20px; margin-top: 10px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
        .monto-final { color: #00ff00; font-size: 30px; font-weight: bold; }
        .tabla-contenedor { max-width: 700px; margin: 30px auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: #2d2d2d; color: #00ff00; }
    </style>
</head>
<body>
    <h2>⛽ Validador GNC</h2>
    
    <div id="reader"></div>

    <div id="resultado" class="resultado">
        <h3 id="patente-detectada"></h3>
        <p>Monto cargado ($):</p>
        <input type="number" id="monto" placeholder="Ej: 4000" oninput="calcular()">
        <div class="monto-final">Total a Cobrar: $<span id="total">0</span></div>
        <p style="color: #aaa;">Descuento 5% aplicado</p>
        <br>
        <button onclick="finalizar()">Confirmar Carga</button>
    </div>

    <div class="tabla-contenedor">
        <h3>📋 Cargas del Turno Actual</h3>
        <table id="tabla-cargas">
            <thead>
                <tr>
                    <th>Fecha/Hora</th>
                    <th>Patente</th>
                    <th>Monto Base</th>
                    <th>Descuento ($)</th>
                    <th>Total Cobrado</th>
                </tr>
