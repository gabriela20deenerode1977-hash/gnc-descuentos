<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador GNC - Playero</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; margin: 0; }
        #reader { width: 100%; max-width: 500px; margin: auto; border: 2px solid #00ff00; }
        .resultado { background: #222; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        input { width: 80%; padding: 15px; font-size: 20px; margin: 10px 0; border-radius: 5px; border: none; text-align: center; }
        button { background: #00ff00; color: black; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; margin: 10px; }
        .btn-descarga { background: #ffc107; color: black; width: 100%; max-width: 400px; font-size: 20px; padding: 20px; margin-top: 30px; border-radius: 10px; font-weight: bold; }
        .monto-final { color: #00ff00; font-size: 30px; font-weight: bold; }
        .tabla-contenedor { max-width: 600px; margin: 30px auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: #2d2d2d; color: #00ff00; }
    </style>
</head>
<body>
    <h2>⛽ Validador GNC</h2>
    
    <div id="reader"></div>

    <div id="resultado" class="resultado">
        <h3 id="patente-detectada"></h3>
        <p>Monto cargado ($):</p>
        <input type="number" id="monto" placeholder="Ej: 4000" oninput="calcular()">
        <div class="monto-final">Total a Cobrar: $<span id="total">0</span></div>
        <p style="color: #aaa;">Descuento 5% aplicado</p>
        <br>
        <button onclick="finalizar()">Confirmar Carga</button>
    </div>

    <div class="tabla-contenedor">
        <h3>📋 Cargas del Turno Actual</h3>
        <table id="tabla-cargas">
            <thead>
                <tr>
                    <th>Fecha/Hora</th>
                    <th>Patente</th>
                    <th>Monto Base</th>
                    <th>Total Cobrado</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <button class="btn-descarga" onclick="descargarYFecharTurno()">📥 DESCARGAR EXCEL Y CERRAR TURNO</button>
    </div>

    <script>
        // Array para guardar las cargas del turno actual
        let cargasDelTurno = JSON.parse(localStorage.getItem('cargas_turno')) || [];

        // Dibujamos el estado actual al abrir la pantalla
        actualizarTabla();

        function onScanSuccess(decodedText) {
            document.getElementById('patente-detectada').innerText = "Vehículo: " + decodedText;
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('reader').style.display = 'none';
            if (window.html5QrcodeScanner) {
                html5QrcodeScanner.clear();
            }
        }

        function calcular() {
            let monto = document.getElementById('monto').value;
            let total = monto * 0.95;
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function finalizar() {
            const patente = document.getElementById('patente-detectada').innerText.replace("Vehículo: ", "");
            const monto = document.getElementById('monto').value;
            const total = document.getElementById('total').innerText;

            if (!monto || monto <= 0) {
                alert("Por favor, ingresa un monto válido.");
                return;
            }

            const fecha = new Date().toLocaleString();

            // Guardamos en la memoria local del turno
            cargasDelTurno.push({ fecha, patente, monto, total });
            localStorage.setItem('cargas_turno', JSON.stringify(cargasDelTurno));

            // Copia de seguridad al servidor de la PC
            fetch('/guardar-carga', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ patente, monto, total })
            }).catch(err => console.error("Error de respaldo:", err));

            alert("✅ Carga registrada.");
            location.reload();
        }

        function actualizarTabla() {
            const tbody = document.querySelector('#tabla-cargas tbody');
            tbody.innerHTML = '';
            cargasDelTurno.forEach(carga => {
                const fila = `<tr>
                    <td>${carga.fecha}</td>
                    <td>${carga.patente}</td>
                    <td>$${carga.monto}</td>
                    <td>$${carga.total}</td>
                </tr>`;
                tbody.innerHTML += fila;
            });
        }

        // NUEVA FUNCIÓN AUTOMÁTICA CON NOMBRE PERSONALIZADO Y CIERRE OBLIGATORIO
        function descargarYFecharTurno() {
            if (cargasDelTurno.length === 0) {
                alert("No hay cargas registradas en este turno.");
                return;
            }

            // 1. Pedirle el nombre del archivo al playero
            let nombreSugerido = "Turno_GNC_" + new Date().toISOString().slice(0,10);
            let nombreArchivo = prompt("Escribe el nombre para el archivo Excel:", nombreSugerido);
            
            // Si el playero cancela o lo deja vacío, no hacemos nada para evitar errores
            if (nombreArchivo === null) return; 
            if (nombreArchivo.trim() === "") {
                nombreArchivo = nombreSugerido;
            }

            // 2. Armar el contenido del Excel limpio
            let contenidoCsv = "sep=,\nFecha y Hora,Patente,Monto Base,Total Cobrado\n";
            cargasDelTurno.forEach(c => {
                contenidoCsv += `"${c.fecha}","${c.patente}","${c.monto}","${c.total}"\n`;
            });

            // 3. Crear el archivo de descarga
            let blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), contenidoCsv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `${nombreArchivo.trim()}.csv`);
            document.body.appendChild(link);
            
            link.click(); // Descarga el archivo
            document.body.removeChild(link);

            // 4. CIERRE DE TURNO INMEDIATO Y OBLIGATORIO: Borra todo de la pantalla y de la memoria
            localStorage.removeItem('cargas_turno');
            cargasDelTurno = [];
            
            alert("🔒 Turno cerrado con éxito. Los datos se han limpiado para el siguiente turno.");
            location.reload(); // Reinicia la pantalla limpia en cero
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
