<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador GNC - Playero</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; margin: 0; }
        #reader { width: 100%; max-width: 500px; margin: auto; border: 2px solid #00ff00; }
        .resultado { background: #222; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        input { width: 80%; padding: 15px; font-size: 20px; margin: 10px 0; border-radius: 5px; border: none; text-align: center; }
        button { background: #00ff00; color: black; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; margin: 10px; }
        
        /* Contenedor estético de filtros de fecha */
        .filtro-fechas {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            max-width: 400px;
            margin: 30px auto 10px auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .filtro-fechas div {
            display: flex;
            justify-content: space-between;
            width: 90%;
            align-items: center;
        }
        .filtro-fechas label { font-weight: bold; color: #aaa; font-size: 16px; }
        .filtro-fechas input[type="date"] { 
            width: 60%; 
            padding: 8px; 
            font-size: 16px; 
            background: #2d2d2d; 
            color: #00ff00; 
            border: 1px solid #444; 
            margin: 0;
        }

        .btn-descarga { background: #ffc107; color: black; width: 100%; max-width: 400px; font-size: 20px; padding: 20px; margin-top: 10px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
        .monto-final { color: #00ff00; font-size: 30px; font-weight: bold; }
        .tabla-contenedor { max-width: 700px; margin: 30px auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: #2d2d2d; color: #00ff00; }
    </style>
</head>
<body>
    <h2>⛽ Validador GNC</h2>
    
    <div id="reader"></div>

    <div id="resultado" class="resultado">
        <h3 id="patente-detectada"></h3>
        <p>Monto cargado ($):</p>
        <input type="number" id="monto" placeholder="Ej: 4000" oninput="calcular()">
        <div class="monto-final">Total a Cobrar: $<span id="total">0</span></div>
        <p style="color: #aaa;">Descuento 5% aplicado</p>
        <br>
        <button onclick="finalizar()">Confirmar Carga</button>
    </div>

    <div class="tabla-contenedor">
        <h3>📋 Cargas del Turno Actual</h3>
        <table id="tabla-cargas">
            <thead>
                <tr>
                    <th>Fecha/Hora</th>
                    <th>Patente</th>
                    <th>Monto Base</th>
                    <th>Descuento ($)</th>
                    <th>Total Cobrado</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <div class="filtro-fechas">
            <h4 style="margin: 0 0 5px 0; color: #00ff00;">📅 Seleccionar Período a Descargar</h4>
            <div>
                <label for="fechaDesde">Desde:</label>
                <input type="date" id="fechaDesde">
            </div>
            <div>
                <label for="fechaHasta">Hasta:</label>
                <input type="date" id="fechaHasta">
            </div>
        </div>

        <button class="btn-descarga" onclick="descargarYFecharTurno()">📥 DESCARGAR EXCEL POR PERÍODO</button>
    </div>

    <script>
        // IP de la computadora de la caja configurada correctamente
        const IP_DE_LA_COMPU = "192.168.1.96"; 

        let cargasDelTurno = JSON.parse(localStorage.getItem('cargas_turno')) || [];

        actualizarTabla();

        // Autocompletar los campos de fecha con el día de hoy por comodidad para el playero
        const hoyStr = new Date().toISOString().slice(0, 10);
        document.getElementById('fechaDesde').value = hoyStr;
        document.getElementById('fechaHasta').value = hoyStr;

        function onScanSuccess(decodedText) {
            document.getElementById('patente-detectada').innerText = "Vehículo: " + decodedText;
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('reader').style.display = 'none';
            if (window.html5QrcodeScanner) {
                html5QrcodeScanner.clear();
            }
        }

        function calcular() {
            let monto = document.getElementById('monto').value;
            let total = monto * 0.95;
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function finalizar() {
            const patente = document.getElementById('patente-detectada').innerText.replace("Vehículo: ", "");
            const monto = parseFloat(document.getElementById('monto').value);

            if (!monto || monto <= 0) {
                alert("Por favor, ingresa un monto válido.");
                return;
            }

            const fecha = new Date().toLocaleString();
            const descuentoPesos = (monto * 0.05).toFixed(2);
            const total = (monto * 0.95).toFixed(2);

            // Guardado local en el celular del playero
            cargasDelTurno.push({ fecha, patente, monto: monto.toFixed(2), descuento: descuentoPesos, total });
            localStorage.setItem('cargas_turno', JSON.stringify(cargasDelTurno));

            // ENVÍO AL EXCEL CENTRAL DE LA COMPUTADORA DE LA CAJA
            fetch(`http://${IP_DE_LA_COMPU}:3000/guardar-carga`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ patente, monto, total })
            })
            .then(res => console.log("Copia guardada en el Excel unificado de la caja."))
            .catch(err => console.error("La compu de la caja está apagada o el servidor no corre:", err));

            alert("✅ Carga registrada.");
            location.reload();
        }

        function actualizarTabla() {
            const tbody = document.querySelector('#tabla-cargas tbody');
            tbody.innerHTML = '';
            cargasDelTurno.forEach(carga => {
                const fila = `<tr>
                    <td>${carga.fecha}</td>
                    <td>${carga.patente}</td>
                    <td>$${carga.monto}</td>
                    <td>$${carga.descuento}</td>
                    <td>$${carga.total}</td>
                </tr>`;
                tbody.innerHTML += fila;
            });
        }

        // FUNCIÓN MODIFICADA: Ahora consulta al Servidor Central pasando las fechas indicadas
        function descargarYFecharTurno() {
            const desde = document.getElementById('fechaDesde').value;
            const hasta = document.getElementById('fechaHasta').value;

            if (!desde || !hasta) {
                alert("Por favor, seleccioná ambas fechas (Desde / Hasta) para procesar el reporte.");
                return;
            }

            // Validar que la fecha "desde" no sea mayor que "hasta"
            if (new Date(desde) > new Date(hasta)) {
                alert("La fecha de inicio 'Desde' no puede ser mayor que la fecha final 'Hasta'.");
                return;
            }

            // Armamos la URL del backend central con los parámetros requeridos
            const urlDescarga = `http://${IP_DE_LA_COMPU}:3000/descargar-reporte?desde=${desde}&hasta=${hasta}`;

            // Hacemos una verificación rápida mediante fetch para alertar si no hay datos antes de forzar la descarga
            fetch(urlDescarga)
            .then(async response => {
                if (response.status === 444) {
                    alert("⚠️ No se encontraron registros de cargas para el rango de fechas seleccionado.");
                    return;
                }
                if (!response.ok) {
                    alert("Ocurrió un error en el servidor central al procesar el Excel.");
                    return;
                }

                // Si todo está OK, forzamos la descarga del archivo .xlsx nativo de manera directa
                window.location.href = urlDescarga;

                // Una vez descargado con éxito el reporte, limpiamos la pantalla local del playero para el próximo turno
                localStorage.removeItem('cargas_turno');
                cargasDelTurno = [];
                
                alert("🔒 Turno procesado y descargado con éxito. Los datos de la pantalla local se limpiaron para el siguiente turno.");
                setTimeout(() => location.reload(), 1000);
            })
            .catch(err => {
                alert("❌ No se pudo conectar con el servidor central de la caja. Verificá que la PC principal esté encendida.");
                console.error(err);
            });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
