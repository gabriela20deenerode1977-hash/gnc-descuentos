<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lector de Patentes</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        #video { width: 100%; max-width: 400px; border: 4px solid #fff; }
    </style>
</head>
<body>
    <h2>Lector de Patentes</h2>
    <video id="video" autoplay playsinline></video>
    <div id="status">Iniciando cámara...</div>
    
    <script>
        const video = document.getElementById('video');
        const IP = "192.168.1.39"; // Asegurate que esta sea la IP de tu PC

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; iniciarEscaneo(); })
            .catch(err => document.getElementById('status').innerText = "Error de cámara: " + err);

        function iniciarEscaneo() {
            setInterval(async () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                if (text.length > 5) {
                    const patente = text.replace(/[^A-Z0-9]/g, '');
                    verificarPatente(patente);
                }
            }, 3000);
        }

        async function verificarPatente(p) {
            const res = await fetch(`http://${IP}:3000/verificar-patente?patente=${p}`);
            if (res.status === 200) {
                const data = await res.json();
                document.getElementById('status').innerHTML = "Cliente: " + data.nombre;
            } else {
                document.getElementById('status').innerText = "Patente no encontrada: " + p;
            }
        }
    </script>
</body>
</html>
