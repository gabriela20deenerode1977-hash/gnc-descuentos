<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Validador GNC</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        #video { width: 100%; max-width: 400px; border: 4px solid #fff; }
        #resultado { font-size: 24px; font-weight: bold; margin-top: 20px; padding: 20px; }
    </style>
</head>
<body>
    <h2>Lector de Patentes</h2>
    <video id="video" autoplay playsinline></video>
    <div id="resultado">Esperando patente...</div>

    <script>
        const video = document.getElementById('video');
        const resultado = document.getElementById('resultado');
        const IP = "192.168.1.39";

        // Iniciar cámara
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s)
            .catch(e => resultado.innerText = "Error cámara: " + e);

        // Lógica de escaneo cada 3 segundos
        setInterval(async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            const patente = text.replace(/[^A-Z0-9]/g, '');
            
            if (patente.length >= 6) {
                buscarPatente(patente);
            }
        }, 3000);

        async function buscarPatente(p) {
            try {
                const res = await fetch(`http://${IP}:3000/verificar?patente=${p}`);
                const texto = await res.text();
                resultado.innerText = texto === "CLIENTE OK" ? "✅ CLIENTE: " + p : "❌ " + texto;
            } catch (e) {
                resultado.innerText = "Error de conexión con servidor";
            }
        }
    </script>
</body>
</html>
